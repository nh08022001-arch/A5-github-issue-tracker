<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Page</title>
    <!--tailwind+daisyui-->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
</head>
<body>
    <!--Navbar-->
    <header class="bg-base-100 shadow-sm">
        <div class="navbar w-10/12 mx-auto">
  <div class="flex-1 gap-2">
    <img src="assets/github-logo.png" alt="">
    <h2 class="btn btn-ghost text-xl">Github Issuses Tracker</h2>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
   <button class="btn btn-primary">Search Issuses</button>
  </div>
</div>
    </header>
    <!--buttons-->
    <section class="w-10/12 mx-auto py-6">
        <div class="flex gap-3">
            <button id="all-btn" class="btn btn-sm btn-primary">All</button>
            <button id="open-btn" class="btn btn-sm btn-outline">Open</button>
            <button id="closed-btn" class="btn btn-sm btn-outline">Close</button>
        </div>
    </section>
    <!--issuses total-->
    <section class="w-10/12 bg-base-100 shadow-sm mx-auto py-8 rounded-lg">
     <div class="flex justify-between items-center px-6">
        <div class="flex gap-4 items-center">

         <img src="assets/Aperture.png" alt="">

        <div class="flex flex-col">
         <h3 id="total-issues" class="font-bold text-xl">0 Issues</h3>
         <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>
       </div>

        <div class="flex gap-6 text-sm">
            <p>Open</p>
            <p>Close</p>
        </div>
     </div>
    </section>
    <!--cards-->
        <section id="issues-container" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 w-10/12 mx-auto mt-10">
        <div class="card bg-base-100 shadow-md border border-base-200">
         <div class="card-body">

    <!-- Title + Status -->
    <div class="flex justify-between items-center">
      <h2 class="card-title text-lg">
        Fix navigation menu on mobile devices
      </h2>
      <span class="badge badge-success">High</span>
    </div>

    <!-- Description -->
    <p class="text-sm text-gray-500">
      The navigation menu doesn't collapse properly on mobile devices.
      Need to fix the responsive behavior.
    </p>

    <!-- Labels -->
    <div class="flex gap-2 mt-2">
      <span class="badge badge-error badge-outline">bug</span>
      <span class="badge badge-warning badge-outline">help wanted</span>
    </div>

    <!-- Footer-->
    <div class="flex justify-between items-center text-xs text-gray-500 mt-4">

      <div>
        <span class="font-semibold">#1 by john_doe</span>
      </div>

      <div>
        Jan 15, 2024
      </div>

    </div>

  </div>
</div>
    </section>
<script src="scripts/script.js"></script>
</body>
</html>
