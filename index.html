<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <!-- tailwind+daisy -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="logo w-[300px] mx-auto pt-32">
        <img src="assets/github-logo.png" alt="">
       <h2 class="font-bold text-xl text-neutral-900">GitHub Issues Tracker</h2>
        <p class="text-xs">Sign in to manage your issuses</p>

    </div>

    <div class="form pt-10">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Username</label>
          <input id="input-text" maxlength="5" minlength="5" type="text" class="input rounded-full bg-base-200" placeholder="Enter Username" />
          <br>
          <label class="label text-neutral font-bold">Password</label>
          <input id="input-password" type="password" maxlength="8" minlength="8" class="input rounded-full bg-base-200" placeholder="Enter Password" />
          <button id="login-btn" class="btn btn-primary mt-4 rounded-full">Sign In</button>
        </fieldset>
      </div>
    </div>
    </div>
</body>
</html>
